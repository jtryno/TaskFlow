name: "PR Pipeline"

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout the repo
        uses: actions/checkout@v6

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install the dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint using black and flake8
        run: black --check . && flake8 .
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:

      - name: Checkout the repo
        uses: actions/checkout@v6

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install the dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run the testing suite (tests/test_tasks.py)
        run: pytest --cov=app
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v6

      - name: Build the docker image
        run: docker build -t taskflow .
  scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v6

      - name: Build the docker image
        run: docker build -t taskflow .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: 'taskflow'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'



