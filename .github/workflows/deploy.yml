name: "Deploy Pipeline"

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:

      - name: Checkout the repo
        uses: actions/checkout@v6

      - name: Log into GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build the docker image
        run: docker build -t ghcr.io/jtryno/taskflow:latest .

      - name: Push the docker image
        run: docker push ghcr.io/jtryno/taskflow:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Log into GHCR
            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the latest image
            docker pull ghcr.io/jtryno/taskflow:latest

            # Stop the old container if there is one running
            docker stop taskflow || true
            
            # Remove the old container
            docker rm taskflow || true

            # Start the new container
            docker run -d --name taskflow --network host -e DATABASE_URL="${{ secrets.DATABASE_URL }}" ghcr.io/jtryno/taskflow:latest
